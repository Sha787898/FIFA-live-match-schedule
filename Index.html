<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 - Live Schedule Hub</title>
    <style>
        :root {
            --bg-color: #0c0f12;
            --card-bg: #171d26;
            --primary-blue: #2f80ed;
            --live-red: #ff3b30;
            --text-main: #ffffff;
            --text-muted: #8b949e;
            --border-color: #262c36;
        }

        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 12px;
            display: flex;
            justify-content: center;
        }

        .container { 
            width: 100%;
            max-width: 550px; 
        }

        /* Top Widget Panel */
        .widget-header {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px 16px 0 16px;
            margin-bottom: 15px;
        }

        .title-box {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .title-box .trophy-icon {
            font-size: 24px;
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 50%;
        }

        .title-box h1 {
            font-size: 18px;
            margin: 0;
            font-weight: 600;
        }

        .title-box p {
            margin: 2px 0 0 0;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Navigation Tabs */
        .tabs {
            display: flex;
            gap: 5px;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 12px 0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
        }

        .tab-btn.active {
            color: var(--primary-blue);
            font-weight: 600;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 25%;
            right: 25%;
            height: 3px;
            background: var(--primary-blue);
            border-radius: 3px 3px 0 0;
        }

        /* Views Display Control */
        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        /* Group Header (Date Rows) */
        .date-section-header {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            margin: 18px 0 8px 4px;
        }

        /* Premium Match Card Layout */
        .match-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .match-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .group-tag {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: bold;
        }

        .team-line {
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Time & Status Box Right Side */
        .status-pane {
            border-left: 1px solid var(--border-color);
            padding-left: 15px;
            min-width: 85px;
            text-align: right;
        }

        .match-time {
            font-size: 14px;
            font-weight: 600;
        }

        .status-text {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* LIVE Custom Glow styles */
        .match-card.live-now {
            border-color: var(--live-red);
            background: linear-gradient(135deg, #171d26 0%, #221215 100%);
        }

        .live-now .match-time {
            color: var(--live-red);
        }

        .live-indicator {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--live-red);
            border-radius: 50%;
            margin-right: 4px;
            animation: pulse-dot 1.2s infinite;
        }

        @keyframes pulse-dot {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* Static Placeholders for Standings & Bracket */
        .placeholder-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px 15px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="widget-header">
        <div class="title-box">
            <span class="trophy-icon">⚽</span>
            <div>
                <h1>World Cup</h1>
                <p>2026 season</p>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="toggleTab('games')">Games</button>
            <button class="tab-btn" onclick="toggleTab('standings')">Standings</button>
            <button class="tab-btn" onclick="toggleTab('bracket')">Bracket</button>
        </div>
    </div>

    <div id="games" class="tab-panel active">
        <div id="dynamic-schedule"></div>
    </div>

    <div id="standings" class="tab-panel">
        <div class="placeholder-box">
            Group Standings data will sync after the ongoing match-day.
        </div>
    </div>

    <div id="bracket" class="tab-panel">
        <div class="placeholder-box">
            Knockout brackets will form automatically post Group-stage results.
        </div>
    </div>
</div>

<script>
// Mock Matches Data Engine
const matchData = [
    { teams: ["Netherlands", "Sweden"], time: "2026-06-20T23:00:00", group: "Group F" },
    { teams: ["Germany", "Côte d'Ivoire"], time: "2026-06-21T02:00:00", group: "Group E" },
    { teams: ["Ecuador", "Curaçao"], time: "2026-06-21T06:00:00", group: "Group E" },
    { teams: ["Tunisia", "Japan"], time: "2026-06-21T10:00:00", group: "Group F" },
    { teams: ["Spain", "Saudi Arabia"], time: "2026-06-21T22:00:00", group: "Group H" }
];

// Switch Tab Navigation Control
function toggleTab(panelId) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    
    event.currentTarget.classList.add('active');
    document.getElementById(panelId).classList.add('active');
}

// Format Header View Group (e.g., Sun, Jun 21)
function parseDateHeader(rawDate) {
    return new Date(rawDate).toLocaleDateString('en-US', { 
        weekday: 'short', month: 'short', day: 'numeric' 
    });
}

// Logic Rendering Pipeline for Live Real-time Engine
function renderLiveEngine() {
    const currentTimestamp = new Date().getTime();
    const targetContainer = document.getElementById('dynamic-schedule');
    const groupedMatches = {};

    // Grouping core execution
    matchData.forEach(match => {
        const matchStartTime = new Date(match.time).getTime();
        const durationWindow = 105 * 60 * 1000; // 1 Hour 45 Mins Match Window
        
        let liveState = 'upcoming';
        if (currentTimestamp >= matchStartTime && currentTimestamp <= (matchStartTime + durationWindow)) {
            liveState = 'live';
        } else if (currentTimestamp > (matchStartTime + durationWindow)) {
            liveState = 'finished';
        }

        const mapKey = new Date(match.time).toDateString();
        if (!groupedMatches[mapKey]) groupedMatches[mapKey] = [];
        groupedMatches[mapKey].push({ ...match, liveState });
    });

    // Build Compiled HTML Template string
    let finalHtml = '';
    
    Object.keys(groupedMatches).sort((x, y) => new Date(x) - new Date(y)).forEach(dateKey => {
        finalHtml += `<div class="date-section-header">${parseDateHeader(dateKey)}</div>`;
        
        groupedMatches[dateKey].forEach(item => {
            const displayTime = new Date(item.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            let statusMarkup = '';
            let cardStateClass = 'match-card';

            if (item.liveState === 'live') {
                cardStateClass += ' live-now';
                statusMarkup = `
                    <div class="match-time"><span class="live-indicator"></span>LIVE</div>
                    <div class="status-text" style="color: var(--live-red)">Ongoing</div>
                `;
            } else if (item.liveState === 'finished') {
                statusMarkup = `
                    <div class="match-time" style="color: var(--text-muted)">FT</div>
                    <div class="status-text">Finished</div>
                `;
            } else {
                statusMarkup = `
                    <div class="match-time">${displayTime}</div>
                    <div class="status-text">Upcoming</div>
                `;
            }

            finalHtml += `
                <div class="${cardStateClass}">
                    <div class="match-details">
                        <div class="group-tag">${item.group}</div>
                        <div class="team-line">🏳️‍🌈 ${item.teams[0]}</div>
                        <div class="team-line">🏳️‍🌈 ${item.teams[1]}</div>
                    </div>
                    <div class="status-pane">${statusMarkup}</div>
                </div>
            `;
        });
    });

    targetContainer.innerHTML = finalHtml;
}

// Auto Execution Trigger intervals
setInterval(renderLiveEngine, 5000); // Prottek 5 seconds por por update hobe background e smoothly
renderLiveEngine();
</script>

</body>
</html>
