<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live FIFA Schedule</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #000; color: #fff; margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: 0 auto; }
        .banner { border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); display: none; }
        .live { background: linear-gradient(135deg, #9f1239, #4c0519); border-color: #f43f5e; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 10px #f43f5e; } 50% { box-shadow: 0 0 25px #f43f5e; } 100% { box-shadow: 0 0 10px #f43f5e; } }
        .match-list { display: grid; gap: 10px; margin-top: 20px; }
        .match-item { background: #1a1a1a; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <div id="status-banner" class="banner">
        <h2 id="match-title">Loading...</h2>
        <div id="match-timer" style="font-weight: bold; margin-top: 5px;"></div>
    </div>
    <div id="schedule-container" class="match-list"></div>
</div>

<script>
const matches = [
    { teams: "Portugal vs DR Congo", time: "2026-06-17T23:00:00", group: "Group K" },
    { teams: "England vs Croatia", time: "2026-06-18T02:00:00", group: "Group L" },
    { teams: "Ghana vs Panama", time: "2026-06-18T05:00:00", group: "Group L" },
    { teams: "Uzbekistan vs Colombia", time: "2026-06-18T08:00:00", group: "Group K" },
    { teams: "Czechia vs South Africa", time: "2026-06-18T22:00:00", group: "Group A" },
    { teams: "Switzerland vs Bosnia & Herz.", time: "2026-06-19T01:00:00", group: "Group B" },
    { teams: "Canada vs Qatar", time: "2026-06-19T04:00:00", group: "Group B" },
    { teams: "Mexico vs South Korea", time: "2026-06-19T07:00:00", group: "Group A" },
    { teams: "USA vs Australia", time: "2026-06-20T01:00:00", group: "Group D" },
    { teams: "Scotland vs Morocco", time: "2026-06-20T04:00:00", group: "Group C" },
    { teams: "Brazil vs Haiti", time: "2026-06-20T06:30:00", group: "Group C" },
    { teams: "Italy vs Nigeria", time: "2026-06-21T02:00:00", group: "Group E" },
    { teams: "Japan vs Serbia", time: "2026-06-22T03:00:00", group: "Group F" },
    { teams: "France vs Chile", time: "2026-06-23T01:00:00", group: "Group G" },
    { teams: "Spain vs Egypt", time: "2026-06-24T05:00:00", group: "Group H" }
];

function update() {
    const now = new Date().getTime();
    const banner = document.getElementById('status-banner');
    const container = document.getElementById('schedule-container');
    
    // লাইভ চেক (ম্যাচ চলাকালীন সময় ১ ঘণ্টা ৪৫ মিনিট ধরে)
    const liveMatch = matches.find(m => now >= new Date(m.time).getTime() && now <= new Date(m.time).getTime() + 6300000);
    
    if (liveMatch) {
        banner.style.display = 'block';
        banner.className = 'banner live';
        document.getElementById('match-title').innerText = liveMatch.teams + " (LIVE)";
        document.getElementById('match-timer').innerText = "Match is ongoing...";
    } else {
        banner.style.display = 'none';
    }

    // আপকামিং শিডিউল ও অটো-রিমুভ (ম্যাচ শেষ হলে লিস্ট থেকে মুছে যাবে)
    const upcoming = matches.filter(m => new Date(m.time).getTime() > now);
    container.innerHTML = upcoming.map(m => `
        <div class="match-item">
            <div><strong>${m.teams}</strong><br><small>${m.group}</small></div>
            <div>${new Date(m.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}<br><small>${new Date(m.time).toLocaleDateString()}</small></div>
        </div>
    `).join('');
}

setInterval(update, 1000);
update();
</script>

</body>
</html>
